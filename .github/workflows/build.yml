name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Regenerate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7 && chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "hidrate.client_id=${{ secrets.HIDRATE_CLIENT_ID }}" >> local.properties
          echo "hidrate.client_secret=${{ secrets.HIDRATE_CLIENT_SECRET }}" >> local.properties
          echo "ROKID_CLIENT_SECRET=${{ secrets.ROKID_CLIENT_SECRET }}" >> local.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Get version name
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=v$(date +'%Y%m%d')-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: HidrateGlasses Debug ${{ steps.version.outputs.tag }}
          body: |
            Debug build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          files: app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
